<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FooDDe - Home</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <header>
        <h1>FooDDe</h1>
    </header>

    <main>
        <h2>Nearby Restaurants</h2>
        <div class="restaurant-list">
            <div th:each="res : ${restaurants}" class="restaurant-card">
                <h3 th:text="${res.name}">Restaurant Name</h3>
                <p th:text="${res.address}">Address</p>
                <p th:text="${res.schedule}">Schedule</p>
                <a th:href="@{'/restaurant/' + ${res.id}}">View Menu</a>
            </div>
        </div>
    </main>
</body>
</html>
