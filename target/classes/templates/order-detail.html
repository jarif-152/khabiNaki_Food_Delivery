<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Details - KhabiNaki</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .order-header {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: bold;
        }
        .status-preparing { background: #fff3cd; color: #856404; }
        .status-delivering { background: #cfe2ff; color: #084298; }
        .status-delivered { background: #d1e7dd; color: #0a3622; }
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin: 20px 0;
            overflow: hidden;
        }
        .progress-fill { background: #27ae60; height: 100%; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="color: white; text-decoration: none;">KhabiNaki</a></h1>
    </header>

    <main>
        <h2>Order #<span th:text="${order.id.substring(0, 8)}">ID</span></h2>

        <!-- Status Section -->
        <div class="order-header">
            <div>
                <p><strong>From:</strong> <span th:text="${restaurant.name}">Restaurant</span></p>
                <p><strong>Date:</strong> <span th:text="${order.id}">Today</span></p>
            </div>
            <div th:class="'status-badge status-' + ${order.status.toLowerCase()}" th:text="${order.status}">Status</div>
        </div>

        <!-- Progress -->
        <div th:if="${!order.status.equals('Pending')}">
            <p><strong>Progress:</strong></p>
            <div class="progress-bar">
                <div class="progress-fill" th:style="'width: ' + (${order.status.equals('Delivered')} ? '100%' : ${order.status.equals('Delivering')} ? '66%' : '33%') + ';'"></div>
            </div>
        </div>

        <!-- Items -->
        <div style="background: white; padding: 20px; border-radius: 8px; margin: 20px 0;">
            <h3>Order Items</h3>
            <table style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid #eee;">
                        <th style="padding: 10px; text-align: left;">Item</th>
                        <th style="padding: 10px; text-align: center;">Qty</th>
                        <th style="padding: 10px; text-align: right;">Price</th>
                        <th style="padding: 10px; text-align: right;">Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="item : ${order.items}" style="border-bottom: 1px solid #eee;">
                        <td th:text="${item.menuItem.name}" style="padding: 10px;">Item</td>
                        <td th:text="${item.quantity}" style="padding: 10px; text-align: center;">1</td>
                        <td th:text="'$' + ${item.menuItem.price}" style="padding: 10px; text-align: right;">$0.00</td>
                        <td th:text="'$' + ${item.subtotal}" style="padding: 10px; text-align: right;">$0.00</td>
                    </tr>
                </tbody>
            </table>

            <!-- Total -->
            <div style="border-top: 2px solid #eee; margin-top: 15px; padding-top: 15px; text-align: right;">
                <div th:if="${order.discountAmount > 0}" style="margin-bottom: 10px;">
                    <strong>Discount (</strong><span th:text="${order.couponCode}">CODE</span><strong>):</strong>
                    <span th:text="'-$' + ${order.discountAmount}">-$0.00</span>
                </div>
                <h3 style="margin: 10px 0; color: #e8491d;">
                    Total: $<span th:text="${order.totalAmount}">0.00</span>
                </h3>
            </div>
        </div>

        <!-- Back Button -->
        <div style="margin-top: 20px;">
            <a href="/orders" style="background: #35424a; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px;">← Back to Orders</a>
        </div>
    </main>
</body>
</html>
