<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Orders - KhabiNaki</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .order-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .order-info h3 { margin: 0 0 5px 0; }
        .order-info p { margin: 3px 0; font-size: 0.9em; color: #666; }
        .order-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.9em;
        }
        .status-preparing { background: #fff3cd; color: #856404; }
        .status-delivering { background: #cfe2ff; color: #084298; }
        .status-delivered { background: #d1e7dd; color: #0a3622; }
    </style>
</head>
<body>
    <header>
        <h1><a href="/" style="color: white; text-decoration: none;">KhabiNaki</a></h1>
    </header>

    <main>
        <h2>My Orders</h2>

        <div th:if="${orders.isEmpty()}">
            <p>No orders yet. <a href="/">Start ordering now!</a></p>
        </div>

        <div th:each="order : ${orders}" class="order-card">
            <div class="order-info">
                <h3>Order #<span th:text="${order.id.substring(0, 8)}">ID</span></h3>
                <p><strong>Amount:</strong> $<span th:text="${order.totalAmount}">0.00</span></p>
                <p><strong>Items:</strong> <span th:text="${order.items.size()}">0</span></p>
            </div>
            <div th:class="'order-status status-' + ${order.status.toLowerCase()}" th:text="${order.status}">Status</div>
        </div>
    </main>
</body>
</html>
